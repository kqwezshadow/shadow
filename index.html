<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }
        
        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
        }
        
        h3 {
            color: #2d3748;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
        }
        
        h3:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 10px auto 0;
            border-radius: 2px;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input::placeholder {
            color: #a0aec0;
        }
        
        button#mainBtn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        button#mainBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button#mainBtn:disabled {
            background: #cbd5e0;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        #feed {
            width: 100%;
            max-width: 550px;
        }
        
        .post {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .post:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .time {
            font-size: 12px;
            color: #718096;
            background: #f7fafc;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .post b {
            font-size: 18px;
            color: #2d3748;
            display: block;
            margin-bottom: 8px;
        }
        
        .post p {
            color: #4a5568;
            font-size: 15px;
            margin: 8px 0 15px;
            line-height: 1.5;
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .like-btn {
            cursor: pointer;
            border: none;
            background: linear-gradient(90deg, #ed64a6, #d53f8c);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(213, 63, 140, 0.3);
        }
        
        .like-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(213, 63, 140, 0.4);
        }
        
        .like-btn:active {
            transform: scale(0.95);
        }
        
        .like-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }
            
            .container {
                padding: 20px;
            }
            
            h3 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>🚀 Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">📤 Опубликовать в облако</button>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

        // КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
            authDomain: "kqwez-token.firebaseapp.com",
            projectId: "kqwez-token",
            storageBucket: "kqwez-token.firebasestorage.app",
            messagingSenderId: "508135236384",
            appId: "1:508135236384:web:75514deba078c0dabfad45",
            measurementId: "G-KS7JWV33JS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // ===========================================
        // ФУНКЦИЯ 1: ОТПРАВКА СООБЩЕНИЯ
        // ===========================================
        window.publishMessage = async () => {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const btn = document.getElementById('mainBtn');
            
            // Валидация
            if (!nameInput.value.trim()) {
                alert('Имя не может быть пустым');
                return;
            }
            
            if (!emailInput.value.trim() || !emailInput.value.includes('@')) {
                alert('Введите корректный email');
                return;
            }
            
            // Блокируем кнопку
            btn.disabled = true;
            btn.textContent = '⏳ Отправка...';
            
            try {
                // Создаем документ
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                
                // Очищаем поля
                nameInput.value = '';
                emailInput.value = '';
                
                // Уведомление
                const notification = document.createElement('div');
                notification.textContent = '✅ Данные успешно отправлены!';
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 25px;
                    background: #48bb78;
                    color: white;
                    border-radius: 8px;
                    font-weight: 500;
                    z-index: 1000;
                    animation: slideIn 0.3s ease;
                    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                `;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 3000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                
                let errorMessage = 'Ошибка: ' + error.message;
                if (error.code === 'permission-denied') {
                    errorMessage = '🔒 Ошибка безопасности: правила Firestore заблокировали запрос';
                }
                
                alert(errorMessage);
                
            } finally {
                // Разблокируем кнопку
                btn.disabled = false;
                btn.textContent = '📤 Опубликовать в облако';
            }
        };

        // ===========================================
        // ФУНКЦИЯ 2: АТОМАРНОЕ ОБНОВЛЕНИЕ ЛАЙКОВ
        // ===========================================
        window.processLike = async (documentId, event) => {
            const docRef = doc(db, "requests", documentId);
            const button = event?.target;
            const originalText = button?.innerHTML;
            
            if (button) {
                button.disabled = true;
                button.innerHTML = '⏳';
            }
            
            try {
                // Атомарная операция increment
                await updateDoc(docRef, { 
                    likes: increment(1) 
                });
                
                console.log(`Лайк для документа ${documentId} добавлен`);
                
                // Визуальная обратная связь
                if (button) {
                    button.innerHTML = '❤️ +1';
                    setTimeout(() => {
                        button.innerHTML = originalText;
                    }, 200);
                }
                
            } catch (error) {
                console.error("Ошибка при добавлении лайка:", error);
                
                if (button) {
                    button.innerHTML = '❌';
                    setTimeout(() => {
                        button.innerHTML = originalText;
                    }, 1000);
                }
                
                let errorMessage = 'Ошибка: ' + error.message;
                if (error.code === 'permission-denied') {
                    errorMessage = '🔒 Правила безопасности запретили это действие';
                } else if (error.code === 'not-found') {
                    errorMessage = '📄 Документ не найден';
                }
                
                alert(errorMessage);
                
            } finally {
                if (button) {
                    button.disabled = false;
                }
            }
        };

        // ===========================================
        // REAL-TIME ПОДПИСКА
        // ===========================================
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            if (snapshot.empty) {
                feed.innerHTML = "<div class='post' style='text-align: center; color: #718096;'>📭 Нет сообщений</div>";
                return;
            }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const docId = doc.id;
                
                // Безопасное отображение времени
                let timeString = 'только что';
                try {
                    if (data.timestamp) {
                        const date = data.timestamp.toDate();
                        timeString = date.toLocaleString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit',
                            day: '2-digit',
                            month: '2-digit'
                        });
                    }
                } catch (e) {
                    timeString = '...';
                }
                
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">🕐 ${timeString}</span>
                        <b>👤 ${data.name || 'Аноним'}</b>
                        <p>📧 ${data.email || 'Нет email'}</p>
                        <button class="like-btn" onclick="processLike('${docId}', event)">
                            ❤️ ${data.likes || 0} лайков
                        </button>
                    </div>
                `;
            });
        }, (error) => {
            console.error("Ошибка подписки:", error);
            document.getElementById('feed').innerHTML = "<div class='post' style='text-align: center; color: #e53e3e;'>❌ Ошибка загрузки</div>";
        });

        // Привязываем первую функцию к кнопке
        document.getElementById('mainBtn').onclick = window.publishMessage;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение | Firebase + GitHub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #statusMessage {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            transition: all 0.3s ease;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .badge {
            background-color: #f0f0f0;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Лабораторная работа: BaaS (Firebase) + PaaS (GitHub Pages)</div>
        <h1>Форма обратной связи</h1>
        <p class="subtitle">Отправьте данные в облачную базу Firestore</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" name="name" placeholder="Иван Иванов" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>
            <button type="submit" id="submitBtn">📤 Отправить данные в Firebase</button>
        </form>

        <div id="statusMessage"></div>
        <div class="footer">
            ⚡ Данные сохраняются в коллекцию <strong>requests</strong> | Тестовый режим Firestore
        </div>
    </div>

    <!-- Импорт модулей Firebase (CDN) -->
    <script type="module">
        // Импорт необходимых функций Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TODO: Вставьте вашу конфигурацию из консоли Firebase
        // (Project Settings -> Your apps -> SDK setup and configuration)
        const firebaseConfig = {
            apiKey: "AIzaSyBxAi8DExample_Your_Actual_Key", // Замените на свой API Key
            authDomain: "your-project-id.firebaseapp.com",     // Замените
            projectId: "your-project-id",                      // Замените
            storageBucket: "your-project-id.appspot.com",      // Замените
            messagingSenderId: "000000000000",                 // Замените
            appId: "1:000000000000:web:xxxxxx"                 // Замените
        };

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        
        // Инициализация Firestore (базы данных)
        const db = getFirestore(app);

        // Получаем элементы DOM
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Функция для отображения статуса
        function showMessage(text, type) {
            statusMessage.textContent = text;
            statusMessage.className = type; // 'success' или 'error'
            statusMessage.style.display = 'block';
            
            // Автоматически скрываем сообщение через 5 секунд
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }

        // Обработка отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Отменяем стандартную отправку формы

            // Блокируем кнопку, чтобы избежать повторной отправки
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';

            // Получаем значения полей
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            // Простейшая валидация
            if (!name || !email) {
                showMessage('Пожалуйста, заполните все поля.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Отправить данные в Firebase';
                return;
            }

            try {
                // Отправка данных в Firestore
                // Команда addDoc: добавляем документ в коллекцию 'requests'
                const docRef = await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    timestamp: serverTimestamp(), // Время сервера Firebase
                    userAgent: navigator.userAgent // Техническая информация
                });

                console.log("Документ успешно записан с ID: ", docRef.id);
                
                // Показываем сообщение об успехе
                showMessage('✅ Данные успешно сохранены в Firebase! Проверьте вкладку Data в Firestore.', 'success');
                
                // Очищаем форму
                form.reset();
                
            } catch (error) {
                console.error("Ошибка при записи в Firestore: ", error);
                showMessage('❌ Ошибка: ' + error.message + '. Проверьте ключи Firebase или режим базы данных.', 'error');
            } finally {
                // Разблокируем кнопку
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Отправить данные в Firebase';
            }
        });
    </script>
    <!-- Ответ на контрольный вопрос в консоли разработчика -->
    <script>
        console.log("--- Контрольный вопрос ---");
        console.log("PaaS (GitHub Pages): Предоставляет среду для размещения готового (статического) кода (HTML, CSS, JS). Мы не управляем сервером, только кодом.");
        console.log("BaaS (Firebase): Предоставляет готовую серверную инфраструктуру (базу данных, аутентификацию). Мы используем API, не думая о серверах.");
        console.log("Вывод: GitHub Pages отвечает за хостинг интерфейса, Firebase — за хранение данных и логику бэкенда.");
    </script>
</body>
</html>

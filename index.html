<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Web App</title>
<style>
    /* Основной стиль страницы */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    /* Контейнер формы */
    .form-container {
        background: #ffffff;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        width: 350px;
        text-align: center;
    }

    h2 {
        margin-bottom: 25px;
        color: #333333;
    }

    input, textarea {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border: 1px solid #d18b5c;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        background-color: #fff3e6;
        color: #5c3d2e;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: #e07b39;
        box-shadow: 0 0 5px rgba(224, 123, 57, 0.5);
    }

    button {
        background-color: #e07b39;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }

    button:hover {
        background-color: #c95c1f;
    }

    #status {
        margin-top: 15px;
        font-weight: bold;
        color: #e07b39;
    }
</style>
</head>
<body>

<div class="form-container">
    <h2>Отправка запроса</h2>

    <form id="requestForm">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" placeholder="Сообщение" required></textarea>
        <button type="submit">Отправить</button>
    </form>

    <p id="status"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Конфигурация Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
  authDomain: "kqwez-token.firebaseapp.com",
  projectId: "kqwez-token",
  storageBucket: "kqwez-token.firebasestorage.app",
  messagingSenderId: "508135236384",
  appId: "1:508135236384:web:75514deba078c0dabfad45",
  measurementId: "G-KS7JWV33JS"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);

// Подключение базы данных Firestore
const db = getFirestore(app);

// Обработка формы
document.getElementById("requestForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    try {
        await addDoc(collection(db, "requests"), {
            name: name,
            email: email,
            message: message,
            date: new Date()
        });

        document.getElementById("status").innerText = "Данные успешно отправлены!";
        document.getElementById("requestForm").reset();

    } catch (error) {
        document.getElementById("status").innerText = "Ошибка отправки: " + error;
    }
});

</script>

</body>
</html>

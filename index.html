<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Web App</title>
</head>
<body>

<h2>Отправка запроса</h2>

<form id="requestForm">
    <input type="text" id="name" placeholder="Ваше имя" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <textarea id="message" placeholder="Сообщение" required></textarea><br><br>
    <button type="submit">Отправить</button>
</form>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Конфигурация Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
  authDomain: "kqwez-token.firebaseapp.com",
  projectId: "kqwez-token",
  storageBucket: "kqwez-token.firebasestorage.app",
  messagingSenderId: "508135236384",
  appId: "1:508135236384:web:75514deba078c0dabfad45",
  measurementId: "G-KS7JWV33JS"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);

// Подключение базы данных Firestore
const db = getFirestore(app);

// Обработка формы
document.getElementById("requestForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    try {
        await addDoc(collection(db, "requests"), {
            name: name,
            email: email,
            message: message,
            date: new Date()
        });

        document.getElementById("status").innerText = "Данные успешно отправлены!";
        document.getElementById("requestForm").reset();

    } catch (error) {
        document.getElementById("status").innerText = "Ошибка отправки: " + error;
    }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Живая лента Firebase</title>
</head>
<body>
  <h1>Лента сообщений</h1>
  <div id="posts"></div>

  <script type="module">
    // 1️⃣ Импорт нужных функций
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-analytics.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js";

    // 2️⃣ Конфигурация Firebase (твой проект)
    const firebaseConfig = {
      apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
      authDomain: "kqwez-token.firebaseapp.com",
      projectId: "kqwez-token",
      storageBucket: "kqwez-token.firebasestorage.app",
      messagingSenderId: "508135236384",
      appId: "1:508135236384:web:75514deba078c0dabfad45",
      measurementId: "G-KS7JWV33JS"
    };

    // 3️⃣ Инициализация Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // 4️⃣ Коллекция сообщений
    const postsCol = collection(db, "requests");
    const q = query(postsCol, orderBy("timestamp", "desc"));

    const container = document.getElementById("posts");

    // 5️⃣ Реактивное отображение сообщений
    onSnapshot(q, (snapshot) => {
      container.innerHTML = "";
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const postEl = document.createElement("div");
        postEl.style.border = "1px solid #ccc";
        postEl.style.padding = "10px";
        postEl.style.marginBottom = "10px";

        postEl.innerHTML = `
          <p><strong>${data.name}</strong> (${data.email})</p>
          <p>${data.text || ""}</p>
          <button onclick="like('${docSnap.id}')">❤ ${data.likes || 0}</button>
        `;

        container.appendChild(postEl);
      });
    });

    // 6️⃣ Функция лайка (атомарно)
    window.like = async (id) => {
      const postRef = doc(db, "requests", id);
      await updateDoc(postRef, { likes: increment(1) });
    };

    // 7️⃣ Функция добавления нового сообщения
    window.addPost = async (name, email, text) => {
      await addDoc(postsCol, {
        name,
        email,
        text,
        likes: 0,
        timestamp: serverTimestamp()
      });
    };
  </script>
</body>
</html>

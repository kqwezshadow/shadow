<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }
        
        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
        }
        
        h3 {
            color: #2d3748;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
        }
        
        h3:after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 10px auto 0;
            border-radius: 2px;
        }
        
        input, textarea {
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            flex: 1;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            background: #cbd5e0;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        button.secondary {
            background: linear-gradient(90deg, #48bb78, #38a169);
        }
        
        button.danger {
            background: linear-gradient(90deg, #f56565, #e53e3e);
        }
        
        #feed {
            width: 100%;
            max-width: 550px;
        }
        
        .post {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .post:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .time {
            font-size: 12px;
            color: #718096;
            background: #f7fafc;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .post b {
            font-size: 18px;
            color: #2d3748;
            display: block;
            margin-bottom: 8px;
        }
        
        .post p {
            color: #4a5568;
            font-size: 15px;
            margin: 8px 0 15px;
            line-height: 1.5;
            padding: 10px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            flex: 1;
            padding: 8px;
            font-size: 14px;
            text-transform: none;
        }
        
        .edit-btn {
            background: linear-gradient(90deg, #4299e1, #3182ce);
        }
        
        .delete-btn {
            background: linear-gradient(90deg, #f56565, #e53e3e);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>🚀 Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <textarea id="message" placeholder="Текст сообщения" rows="3"></textarea>
        <div class="button-group">
            <button id="mainBtn">📤 Опубликовать</button>
            <button id="statsBtn" class="secondary">📊 Статистика</button>
        </div>
    </div>

    <div id="feed"></div>

    <!-- Модальное окно для редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">✏️ Редактировать сообщение</h3>
            <input type="text" id="editName" placeholder="Имя">
            <input type="email" id="editEmail" placeholder="Email">
            <textarea id="editMessage" placeholder="Текст сообщения" rows="3"></textarea>
            <input type="hidden" id="editId">
            <div class="modal-buttons">
                <button id="saveEditBtn" class="secondary">💾 Сохранить</button>
                <button id="cancelEditBtn" class="danger">❌ Отмена</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment, deleteDoc, getDocs
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

        // КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
            authDomain: "kqwez-token.firebaseapp.com",
            projectId: "kqwez-token",
            storageBucket: "kqwez-token.firebasestorage.app",
            messagingSenderId: "508135236384",
            appId: "1:508135236384:web:75514deba078c0dabfad45",
            measurementId: "G-KS7JWV33JS"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // ===========================================
        // ФУНКЦИЯ 1: ПОЛУЧЕНИЕ СТАТИСТИКИ
        // ===========================================
        window.getCollectionStats = async () => {
            const statsBtn = document.getElementById('statsBtn');
            const originalText = statsBtn.innerHTML;
            
            statsBtn.disabled = true;
            statsBtn.innerHTML = '⏳ Загрузка...';
            
            try {
                const querySnapshot = await getDocs(collection(db, "requests"));
                
                let totalLikes = 0;
                let totalMessages = querySnapshot.size;
                let uniqueUsers = new Set();
                let totalWords = 0;
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    totalLikes += data.likes || 0;
                    if (data.email) {
                        uniqueUsers.add(data.email);
                    }
                    if (data.message) {
                        totalWords += data.message.split(' ').length;
                    }
                });
                
                const stats = {
                    totalMessages,
                    totalLikes,
                    uniqueUsers: uniqueUsers.size,
                    averageLikes: totalMessages ? (totalLikes / totalMessages).toFixed(1) : 0,
                    averageWords: totalMessages ? Math.round(totalWords / totalMessages) : 0
                };
                
                // Показываем статистику
                const statsMessage = `
                    📊 СТАТИСТИКА КОЛЛЕКЦИИ:
                    
                    • Всего сообщений: ${stats.totalMessages}
                    • Всего лайков: ${stats.totalLikes}
                    • Уникальных пользователей: ${stats.uniqueUsers}
                    • Среднее лайков: ${stats.averageLikes}
                    • Средняя длина сообщения: ${stats.averageWords} слов
                `;
                
                alert(statsMessage);
                
                // Логируем в консоль для разработчика
                console.log('📊 Статистика:', stats);
                
                return stats;
                
            } catch (error) {
                console.error('Ошибка при получении статистики:', error);
                
                let errorMessage = 'Ошибка: ' + error.message;
                if (error.code === 'permission-denied') {
                    errorMessage = '🔒 Нет прав для чтения статистики';
                }
                
                alert(errorMessage);
                
            } finally {
                statsBtn.disabled = false;
                statsBtn.innerHTML = originalText;
            }
        };

        // ===========================================
        // ФУНКЦИЯ 2: РЕДАКТИРОВАНИЕ СООБЩЕНИЯ
        // ===========================================
        window.editMessage = (docId, currentName, currentEmail, currentMessage) => {
            // Заполняем модальное окно
            document.getElementById('editId').value = docId;
            document.getElementById('editName').value = currentName || '';
            document.getElementById('editEmail').value = currentEmail || '';
            document.getElementById('editMessage').value = currentMessage || '';
            
            // Показываем модальное окно
            document.getElementById('editModal').classList.add('active');
        };

        // Функция сохранения изменений
        window.saveEditedMessage = async () => {
            const docId = document.getElementById('editId').value;
            const newName = document.getElementById('editName').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            const newMessage = document.getElementById('editMessage').value.trim();
            
            if (!newName || !newEmail || !newMessage) {
                alert('Все поля должны быть заполнены');
                return;
            }
            
            const saveBtn = document.getElementById('saveEditBtn');
            const originalText = saveBtn.innerHTML;
            
            saveBtn.disabled = true;
            saveBtn.innerHTML = '⏳ Сохранение...';
            
            try {
                const docRef = doc(db, "requests", docId);
                
                await updateDoc(docRef, {
                    name: newName,
                    email: newEmail,
                    message: newMessage,
                    editedAt: serverTimestamp()
                });
                
                // Закрываем модальное окно
                document.getElementById('editModal').classList.remove('active');
                
                // Уведомление об успехе
                const notification = document.createElement('div');
                notification.textContent = '✅ Сообщение обновлено';
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 25px;
                    background: #48bb78;
                    color: white;
                    border-radius: 8px;
                    font-weight: 500;
                    z-index: 1001;
                    animation: slideIn 0.3s ease;
                    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                `;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 3000);
                
            } catch (error) {
                console.error('Ошибка при редактировании:', error);
                
                let errorMessage = 'Ошибка: ' + error.message;
                if (error.code === 'permission-denied') {
                    errorMessage = '🔒 Изменение запрещено правилами безопасности';
                }
                
                alert(errorMessage);
                
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        };

        // ===========================================
        // REAL-TIME ПОДПИСКА
        // ===========================================
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            if (snapshot.empty) {
                feed.innerHTML = "<div class='post' style='text-align: center; color: #718096;'>📭 Нет сообщений</div>";
                return;
            }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const docId = doc.id;
                
                // Безопасное отображение времени
                let timeString = 'только что';
                try {
                    if (data.timestamp) {
                        const date = data.timestamp.toDate();
                        timeString = date.toLocaleString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit',
                            day: '2-digit',
                            month: '2-digit'
                        });
                    }
                } catch (e) {
                    timeString = '...';
                }
                
                // Отметка о редактировании
                const editedMark = data.editedAt ? ' (ред.)' : '';
                
                feed.innerHTML += `
                    <div class="post" id="post-${docId}">
                        <span class="time">🕐 ${timeString}${editedMark}</span>
                        <b>👤 ${data.name || 'Аноним'}</b>
                        <p>📧 ${data.email || 'Нет email'}</p>
                        <p>💬 ${data.message || 'Нет текста'}</p>
                        <div class="post-actions">
                            <button class="action-btn edit-btn" onclick="editMessage('${docId}', '${data.name || ''}', '${data.email || ''}', '${data.message || ''}')">
                                ✏️ Редактировать
                            </button>
                        </div>
                    </div>
                `;
            });
        }, (error) => {
            console.error("Ошибка подписки:", error);
            document.getElementById('feed').innerHTML = "<div class='post' style='text-align: center; color: #e53e3e;'>❌ Ошибка загрузки</div>";
        });

        // ===========================================
        // ОБРАБОТЧИКИ СОБЫТИЙ
        // ===========================================
        
        // Публикация сообщения
        document.getElementById('mainBtn').onclick = async () => {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const messageInput = document.getElementById('message');
            
            if (!nameInput.value.trim() || !emailInput.value.trim() || !messageInput.value.trim()) {
                alert('Все поля должны быть заполнены');
                return;
            }
            
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Отправка...';
            
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    message: messageInput.value.trim(),
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                
                nameInput.value = '';
                emailInput.value = '';
                messageInput.value = '';
                
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 Опубликовать';
            }
        };

        // Статистика
        document.getElementById('statsBtn').onclick = window.getCollectionStats;

        // Модальное окно
        document.getElementById('saveEditBtn').onclick = window.saveEditedMessage;
        
        document.getElementById('cancelEditBtn').onclick = () => {
            document.getElementById('editModal').classList.remove('active');
        };

        // Закрытие по клику вне модального окна
        window.onclick = (event) => {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        };
    </script>
</body>
</html>

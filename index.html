<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облачное приложение | Firebase + GitHub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .badge {
            background-color: #f0f0f0;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Лабораторная работа: BaaS (Firebase) + PaaS (GitHub Pages)</div>
        <h1>Форма обратной связи</h1>
        <p class="subtitle">Отправьте данные в облачную базу Firestore</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" name="name" placeholder="Иван Иванов" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>
            <button type="submit" id="submitBtn">📤 Отправить данные в Firebase</button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <!-- Здесь начинается ВАШ скрипт -->
    <script type="module">
        // Импорт модулей Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ВАША КОНФИГУРАЦИЯ (вы прислали)
        const firebaseConfig = {
            apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
            authDomain: "kqwez-token.firebaseapp.com",
            projectId: "kqwez-token",
            storageBucket: "kqwez-token.firebasestorage.app",
            messagingSenderId: "508135236384",
            appId: "1:508135236384:web:75514deba078c0dabfad45",
            measurementId: "G-KS7JWV33JS"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Получаем элементы DOM
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Функция для отображения статуса
        function showMessage(text, type) {
            statusMessage.textContent = text;
            statusMessage.className = type;
            statusMessage.style.display = 'block';
            
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }

        // Обработка отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!name || !email) {
                showMessage('Пожалуйста, заполните все поля.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Отправить данные в Firebase';
                return;
            }

            try {
                // Отправка в коллекцию 'requests'
                const docRef = await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    timestamp: serverTimestamp(),
                    userAgent: navigator.userAgent
                });

                console.log("Документ записан с ID: ", docRef.id);
                showMessage('✅ Данные успешно сохранены в Firebase! Проверьте Firestore.', 'success');
                form.reset();
                
            } catch (error) {
                console.error("Ошибка: ", error);
                showMessage('❌ Ошибка: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Отправить данные в Firebase';
            }
        });
    </script>
    
    <!-- Ответ на контрольный вопрос -->
    <script>
        console.log("--- Контрольный вопрос ---");
        console.log("PaaS (GitHub Pages): Платформа для хостинга статических сайтов.");
        console.log("BaaS (Firebase): Готовая серверная инфраструктура (база данных).");
    </script>
</body>
</html>

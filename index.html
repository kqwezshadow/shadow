<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase Реактивное приложение</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #4361ee; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; margin: 5px 0; }
        button:hover { background: #3046bf; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .post { list-style: none; padding: 15px; margin: 10px 0; background: #f9f9f9; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post:hover { background: #f0f0f0; }
        .time { font-size: 0.8em; color: #666; }
        .like-btn { background: #ff6b6b; width: auto; padding: 5px 15px; margin: 5px 0; }
        .delete-attempt { background: #6c757d; width: auto; padding: 5px 15px; }
        #feed { width: 100%; max-width: 500px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Административная панель</h3>
        <input type="text" id="name" placeholder="Введите имя">
        <input type="email" id="email" placeholder="Введите email">
        <textarea id="message" placeholder="Введите сообщение" rows="3"></textarea>
        <button id="mainBtn">Отправить сообщение</button>
    </div>
    
    <h3>Лента сообщений (обновляется в реальном времени):</h3>
    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ ИЗ ВАШЕГО ПОСЛЕДНЕГО ФАЙЛА
        const firebaseConfig = {
            apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
            authDomain: "kqwez-token.firebaseapp.com",
            projectId: "kqwez-token",
            storageBucket: "kqwez-token.firebasestorage.app",
            messagingSenderId: "508135236384",
            appId: "1:508135236384:web:75514deba078c0dabfad45",
            measurementId: "G-KS7JWV33JS"
        };

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция для обработки лайков
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
                console.log("Лайк добавлен");
            } catch (error) {
                console.error("Ошибка при добавлении лайка:", error.message);
                alert("Ошибка безопасности: " + error.message);
            }
        };

        // Отправка нового сообщения
        document.getElementById('mainBtn').onclick = async () => {
            const btn = document.getElementById('mainBtn');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const messageInput = document.getElementById('message');
            
            // Валидация
            if (!nameInput.value || !emailInput.value || !messageInput.value) {
                alert("Пожалуйста, заполните все поля");
                return;
            }
            
            btn.disabled = true;
            
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value,
                    email: emailInput.value,
                    message: messageInput.value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                
                // Очистка полей после успешной отправки
                nameInput.value = "";
                emailInput.value = "";
                messageInput.value = "";
                
                console.log("Сообщение успешно добавлено");
            } catch (e) { 
                console.error("Ошибка:", e);
                alert("Ошибка безопасности! Данные отклонены сервером: " + e.message); 
            } finally {
                btn.disabled = false;
            }
        };

        // REAL-TIME ПОДПИСКА С СОРТИРОВКОЙ
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            if (snapshot.empty) {
                feed.innerHTML = "<div class='post'>Нет сообщений. Напишите первое!</div>";
                return;
            }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const docId = doc.id;
                
                // Форматирование времени
                let timeString = "только что";
                if (data.timestamp) {
                    const date = data.timestamp.toDate();
                    timeString = date.toLocaleString();
                }
                
                // Создание элемента поста
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                postDiv.innerHTML = `
                    <div>
                        <span class="time">${timeString}</span>
                        <h4 style="margin: 5px 0;">${data.name || 'Аноним'}</h4>
                        <p style="margin: 5px 0;"><b>Email:</b> ${data.email || 'Нет'}</p>
                        <p style="margin: 5px 0;">${data.message || ''}</p>
                        <button class="like-btn" onclick="processLike('${docId}')">
                            ❤️ Лайки: ${data.likes || 0}
                        </button>
                        <button class="delete-attempt" onclick="attemptHack('${docId}')">
                            ⚠️ Попытка взлома (изменить текст)
                        </button>
                    </div>
                `;
                feed.appendChild(postDiv);
            });
        }, (error) => {
            console.error("Ошибка подписки:", error);
            document.getElementById('feed').innerHTML = "<div class='post'>Ошибка загрузки данных</div>";
        });

        // Функция для демонстрации безопасности (попытка изменить текст)
        window.attemptHack = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                // Пытаемся изменить текст (должно быть запрещено правилами)
                await updateDoc(docRef, { 
                    message: "ВЗЛОМАННЫЙ ТЕКСТ",
                    name: "ХАКЕР" 
                });
                alert("Упс... Это сработало? Правила безопасности не настроены!");
            } catch (error) {
                alert("✅ Защита сработала! Ошибка: " + error.message);
            }
        };
    </script>
</body>
</html>

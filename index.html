<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>
    <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s ease-in-out; }
    button#mainBtn:hover { background: #0056b3; }
    button#mainBtn:disabled { background: #ccc; cursor: not-allowed; }
    .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; box-sizing: border-box; }
    .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
    .like-btn:hover { background: #e2e6ea; }
    .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

        // КОНФИГУРАЦИЯ (ваши ключи)
        const firebaseConfig = {
            apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
            authDomain: "kqwez-token.firebaseapp.com",
            projectId: "kqwez-token",
            storageBucket: "kqwez-token.firebasestorage.app",
            messagingSenderId: "508135236384",
            appId: "1:508135236384:web:75514deba078c0dabfad45",
            measurementId: "G-KS7JWV33JS"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
                console.log("Лайк добавлен");
            } catch (error) {
                console.error("Ошибка:", error);
                alert("Ошибка: " + error.message);
            }
        };

        // МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
        document.getElementById('mainBtn').onclick = async () => {
            const btn = document.getElementById('mainBtn');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            
            if (!nameInput.value || !emailInput.value) {
                alert("Пожалуйста, заполните все поля");
                return;
            }
            
            btn.disabled = true;
            
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value,
                    email: emailInput.value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                
                // Очистка поля email
                emailInput.value = "";
                nameInput.value = ""; // Добавил очистку имени
                
                console.log("Данные успешно добавлены");
            } catch (e) { 
                console.error("Ошибка безопасности:", e);
                alert("Ошибка безопасности: Данные отклонены сервером."); 
            }
            
            btn.disabled = false;
        };

        // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            if (snapshot.empty) {
                feed.innerHTML = "<div class='post'>Нет сообщений</div>";
                return;
            }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const docId = doc.id;
                
                // Безопасное отображение времени
                let timeString = '...';
                try {
                    if (data.timestamp) {
                        timeString = data.timestamp.toDate().toLocaleTimeString();
                    }
                } catch (e) {
                    timeString = '...';
                }
                
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${timeString}</span>
                        <b>${data.name || 'Аноним'}</b>
                        <p style="margin: 5px 0;">${data.email || ''}</p>
                        <button class="like-btn" onclick="processLike('${docId}')"> ❤️ ${data.likes || 0}</button>
                    </div>
                `;
            });
        }, (error) => {
            console.error("Ошибка подписки:", error);
            document.getElementById('feed').innerHTML = "<div class='post'>Ошибка загрузки</div>";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Web App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #fff8b0; /* светло-жёлтый фон */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .form-container {
        background-color: #ffffff;
        padding: 20px 25px;
        border-radius: 8px;
        width: 320px;
        text-align: center;
    }

    h2 {
        margin-bottom: 15px;
        color: #333333;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
    }

    button {
        background-color: #f4a261;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
    }

    #status {
        margin-top: 10px;
        color: #f4a261;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="form-container">
    <h2>Отправка запроса</h2>

    <form id="requestForm">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" placeholder="Сообщение" required></textarea>
        <button type="submit">Отправить</button>
    </form>

    <p id="status"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Конфигурация Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC1FadsdnN8ZnKkdgYKqfMIOgxyph5zM3A",
  authDomain: "kqwez-token.firebaseapp.com",
  projectId: "kqwez-token",
  storageBucket: "kqwez-token.firebasestorage.app",
  messagingSenderId: "508135236384",
  appId: "1:508135236384:web:75514deba078c0dabfad45",
  measurementId: "G-KS7JWV33JS"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Обработка формы
document.getElementById("requestForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    try {
        await addDoc(collection(db, "requests"), {
            name: name,
            email: email,
            message: message,
            date: new Date()
        });

        document.getElementById("status").innerText = "Данные успешно отправлены!";
        document.getElementById("requestForm").reset();
    } catch (error) {
        document.getElementById("status").innerText = "Ошибка отправки: " + error;
    }
});
</script>

</body>
</html>
